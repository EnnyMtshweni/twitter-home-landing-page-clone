<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home / X-clone timeline</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app">

  <!-- LEFT SIDEBAR -->
  <aside class="left-sidebar">
    <div>
      <a href="./index.html" class="logo" aria-label="x timeline home">
        <img src="./images/download.png" alt="Twitter logo" style="width: 28px; height: 28px; object-fit: contain;">
      </a>
      <nav class="nav-list" aria-label="Primary">
        <a href="./index.html" class="nav-item active"><span>Home</span></a>
        <a href="./explore.html" class="nav-item" id="navExplore"><span>Explore</span></a>
        <a href="./index.html" class="nav-item" id="navNotifications"><span>Notifications</span><span class="badge">3</span></a>
        <a href="./index.html" class="nav-item" id="navMessages"><span>Messages</span></a>
        <a href="./index.html" class="nav-item" id="navBookmarks"><span>Bookmarks</span></a>
        <a href="./login.html" class="nav-item" id="navProfile"><span>Profile</span></a>
        <a href="./index.html" class="nav-item" id="navMore"><span>More</span></a>
      </nav>
      <button class="tweet-btn-main" data-open-modal>
        <span class="full-label">Post</span>
        <span class="icon-label" style="display:none;"></span>
      </button>
    </div>

    <div>
      <label class="theme-toggle">
        <span style="display:flex;align-items:center;gap:10px;">
          <span id="themeIcon"></span>
          <span class="full-label">Dark mode</span>
        </span>
        <span class="switch">
          <input type="checkbox" class="theme-checkbox">
          <span class="slider"></span>
        </span>
      </label>
      <a href="./login.html" class="profile-card">
        <img src="./images/MY IMAGE.jpg" alt="You" class="avatar" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
        <div class="names">
          <div class="name">EnnyMtshweni</div>
          <div class="handle">@EnnyMtshweni</div>
        </div>
        <span class="more-icon" id="profileMore"></span>
      </a>
    </div>
  </aside>

  <!-- MAIN TIMELINE -->
  <main class="main">
    <header class="main-header">
      <div style="display:flex;align-items:center;gap:20px;">
        <a href="./index.html" class="back-btn" id="mobileBack"></a>
        <h2>Home</h2>
      </div>
    </header>

    <div class="tabs">
      <div class="tab active">For you</div>
      <div class="tab">Following</div>
    </div>

    <section class="composer" id="inlineComposer">
      <img src="./images/MY IMAGE.jpg" alt="You" class="avatar" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
      <div class="composer-body">
        <textarea placeholder="What's happening?" rows="1"></textarea>
        <div class="composer-footer">
          <div class="composer-icons">
            <button class="icon-btn" id="iconImage" title="Media"></button>
            <button class="icon-btn" id="iconGif" title="GIF"></button>
            <button class="icon-btn" id="iconPoll" title="Poll"></button>
            <button class="icon-btn" id="iconEmoji" title="Emoji"></button>
            <button class="icon-btn" id="iconSchedule" title="Schedule"></button>
            <button class="icon-btn" id="iconLocation" title="Location"></button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="char-counter" style="font-size:13px;color:var(--text-secondary);"></span>
            <button class="composer-submit">Post</button>
          </div>
        </div>
      </div>
    </section>

    <section id="feed" aria-label="Timeline">
      <div class="loading-spinner"></div>
    </section>
  </main>

  <!-- RIGHT SIDEBAR -->
  <aside class="right-sidebar">
    <div class="search-box">
      <span id="searchIcon"></span>
      <input type="text" placeholder="Search Twitter" id="searchInput">
    </div>
    <div class="widget" id="trendsWidget"></div>
    <div class="widget" id="followWidget"></div>
    <div class="footer-links">
      <a href="./index.html">Terms of Service</a>
      <a href="./index.html">Privacy Policy</a>
      <a href="./index.html">Cookie Policy</a>
      <a href="./index.html">Accessibility</a>
      <a href="./index.html">Ads info</a>
      <a href="./index.html">More</a>
      <span>x</span>
    </div>
  </aside>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="mobile-nav" aria-label="Mobile navigation">
  <a href="./index.html" id="mnHome"></a>
  <a href="./explore.html" id="mnExplore"></a>
  <a href="./index.html" id="mnNotif"></a>
  <a href="./index.html" id="mnMail"></a>
</nav>
<button class="fab" data-open-modal aria-label="New Tweet" id="fabBtn"></button>

<!-- TWEET MODAL (Cursor feature) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalCloseBtn"></button>
    <p class="modal-reply-note hidden"></p>
    <div class="composer" style="border-bottom:none;">
      <img src="./images/MY IMAGE.jpg" alt="You" class="avatar" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
      <div class="composer-body">
        <textarea placeholder="What's happening?" rows="3"></textarea>
        <div class="composer-footer">
          <div class="composer-icons">
            <button class="icon-btn"></button>
            <button class="icon-btn"></button>
            <button class="icon-btn"></button>
            <button class="icon-btn"></button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="char-counter" style="font-size:13px;color:var(--text-secondary);"></span>
            <button class="composer-submit">Post</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  /* Inject icons that need JS-side SVG strings (kept out of raw HTML above for readability) */
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelector('.left-sidebar .nav-item.active').innerHTML = ICONS.homeFilled + '<span>Home</span>';
    document.getElementById('navExplore').innerHTML = ICONS.explore + '<span>Explore</span>';
    document.getElementById('navNotifications').innerHTML = ICONS.bell + '<span>Notifications</span><span class="badge">3</span>';
    document.getElementById('navMessages').innerHTML = ICONS.mail + '<span>Messages</span>';
    document.getElementById('navBookmarks').innerHTML = ICONS.bookmark + '<span>Bookmarks</span>';
    document.getElementById('navProfile').innerHTML = ICONS.user + '<span>Profile</span>';
    document.getElementById('navMore').innerHTML = ICONS.more + '<span>More</span>';
    document.getElementById('mobileBack').innerHTML = ICONS.back;
    document.getElementById('profileMore').innerHTML = ICONS.dots;
    document.getElementById('searchIcon').innerHTML = ICONS.search;
    document.getElementById('themeIcon').innerHTML = ICONS.moon;
    document.getElementById('iconImage').innerHTML = ICONS.image;
    document.getElementById('iconGif').innerHTML = ICONS.gif;
    document.getElementById('iconPoll').innerHTML = ICONS.poll;
    document.getElementById('iconEmoji').innerHTML = ICONS.emoji;
    document.getElementById('iconSchedule').innerHTML = ICONS.schedule;
    document.getElementById('iconLocation').innerHTML = ICONS.location;
    document.getElementById('mnHome').innerHTML = ICONS.homeFilled;
    document.getElementById('mnExplore').innerHTML = ICONS.explore;
    document.getElementById('mnNotif').innerHTML = ICONS.bell;
    document.getElementById('mnMail').innerHTML = ICONS.mail;
    document.getElementById('fabBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>';
    document.querySelector('.tweet-btn-main .icon-label').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:24px;height:24px;"><path d="M12 5v14M5 12h14"/></svg>';
    document.getElementById('modalCloseBtn').innerHTML = ICONS.x;
    document.querySelectorAll('.modal .composer-icons .icon-btn')[0].innerHTML = ICONS.image;
    document.querySelectorAll('.modal .composer-icons .icon-btn')[1].innerHTML = ICONS.gif;
    document.querySelectorAll('.modal .composer-icons .icon-btn')[2].innerHTML = ICONS.poll;
    document.querySelectorAll('.modal .composer-icons .icon-btn')[3].innerHTML = ICONS.emoji;
  });
</script>
</body>
