<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in / x timeline</title>
<link rel="stylesheet" href="./style.css">
<style>
  .login-wrap {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .login-brand {
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-brand svg { width: 220px; height: 220px; color: #fff; }
  .login-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 10%;
  }
  .login-panel .mobile-logo { display: none; color: var(--blue); width: 40px; height: 40px; margin-bottom: 24px; }
  .login-panel h1 { font-size: 31px; margin: 0 0 32px; }
  .field {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 12px 0;
    margin-bottom: 16px;
    position: relative;
    height: 56px;
  }
  .field.error { border-color: var(--pink); }
  .field label {
    position: absolute;
    left: 12px;
    top: 16px;
    color: var(--text-secondary);
    font-size: 15px;
    transition: 0.15s ease;
    pointer-events: none;
  }
  .field input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font-size: 17px;
    padding-top: 8px;
  }
  .field input:focus ~ label,
  .field input:not(:placeholder-shown) ~ label {
    top: 6px;
    font-size: 12px;
    color: var(--blue);
  }
  .field.error input:focus ~ label, .field.error input:not(:placeholder-shown) ~ label { color: var(--pink); }
  .error-text { color: var(--pink); font-size: 13px; margin: -10px 0 14px; display: none; }
  .error-text.show { display: block; }
  .login-submit {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-full);
    padding: 14px 0;
    font-weight: 700;
    font-size: 16px;
    width: 100%;
    margin-top: 8px;
    opacity: 0.5;
  }
  .login-submit.active { opacity: 1; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-secondary); font-size: 13px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .alt-btn {
    width: 100%;
    padding: 10px 0;
    border-radius: var(--radius-full);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .alt-btn:hover { background: var(--hover); }
  .signup-line { margin-top: 24px; font-size: 15px; color: var(--text-secondary); }
  .signup-line a { color: var(--blue); }
  .demo-note { background: var(--blue-tint); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  @media (max-width: 900px) {
    .login-wrap { grid-template-columns: 1fr; }
    .login-brand { display: none; }
    .login-panel .mobile-logo { display: block; }
    .login-panel { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <img src="./images/download.png" alt="Twitter logo" style="width: 40px; height: 40px; object-fit: contain;">
  </div>

  <div class="login-panel">
    <img class="mobile-logo" src="./images/download.png" alt="Twitter logo" style="width: 40px; height: 40px; object-fit: contain;">
    <h1>Log in to FakeTwitter HQ</h1>

    <div class="demo-note">This is a demo login for the course project — any email + a 4+ character password logs you in. Nothing is sent anywhere. 🤫</div>

    <button class="alt-btn">Sign in with Google (demo)</button>
    <button class="alt-btn">Sign in with Apple (demo)</button>
    <div class="divider">or</div>

    <form id="loginForm" novalidate>
      <div class="field" id="emailField">
        <input type="text" id="emailInput" placeholder=" " autocomplete="off">
        <label for="emailInput">Email or username</label>
      </div>
      <div class="error-text" id="emailError">Enter an email or username.</div>

      <div class="field" id="passField">
        <input type="password" id="passInput" placeholder=" " autocomplete="off">
        <label for="passInput">Password</label>
      </div>
      <div class="error-text" id="passError">Password must be at least 4 characters.</div>

      <button type="submit" class="login-submit" id="loginSubmit">Log in</button>
    </form>

    <p class="signup-line">Don't have an account? <a href="./signup.html">Sign up</a></p>
    <p class="signup-line"><a href="./index.html">← Back to demo timeline</a></p>
  </div>
</div>

<script>
  const emailInput = document.getElementById("emailInput");
  const passInput = document.getElementById("passInput");
  const submitBtn = document.getElementById("loginSubmit");
  const form = document.getElementById("loginForm");

  function validate() {
    const ok = emailInput.value.trim().length > 0 && passInput.value.length >= 4;
    submitBtn.classList.toggle("active", ok);
    return ok;
  }
  emailInput.addEventListener("input", validate);
  passInput.addEventListener("input", validate);

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const emailOk = emailInput.value.trim().length > 0;
    const passOk = passInput.value.length >= 4;
    document.getElementById("emailField").classList.toggle("error", !emailOk);
    document.getElementById("emailError").classList.toggle("show", !emailOk);
    document.getElementById("passField").classList.toggle("error", !passOk);
    document.getElementById("passError").classList.toggle("show", !passOk);
    if (emailOk && passOk) {
      localStorage.setItem("ftwitter_user", emailInput.value.trim());
      window.location.href = "index.html";
    }
  });
</script>
</body>
</html>
